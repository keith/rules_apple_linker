name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The new version to tag, ex: 1.0.5'
        required: true
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Create archive
        run: COPYFILE_DISABLE=1 tar czvf "rules_apple_linker.$TAG.tar.gz" ./*
        env:
          TAG: ${{ inputs.tag }}
      - name: Attest archive
        id: attest
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: rules_apple_linker.${{ inputs.tag }}.tar.gz
      - name: Prepare attestation
        run: jq --compact-output < "${{ steps.attest.outputs.bundle-path }}" > "rules_apple_linker.$TAG.tar.gz.intoto.jsonl"
        env:
          TAG: ${{ inputs.tag }}
      - name: Create Release
        run: |
          set -euo pipefail

          archive="rules_apple_linker.$TAG.tar.gz"
          gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name="$TAG" -f target_commitish="$GITHUB_REF_NAME" --jq .body > notes.md
          ./.github/generate-notes.sh "$TAG" "$archive" >> notes.md
          gh release create "$TAG" --title "$TAG" --target "$GITHUB_REF_NAME" --notes-file notes.md \
            "$archive" \
            "$archive.intoto.jsonl"
        env:
          TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: create-release
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@d5e7cfa40eeb82eb0031f748d1d03c491535f9b5
    with:
      tag_name: ${{ inputs.tag }}
      registry_fork: keith/bazel-central-registry
      # TODO: https://github.com/bazelbuild/bazel-central-registry/blob/5fe5410761c62795e06ed9555f17e59b31d4e830/tools/slsa.py#L36-L38
      attest: false
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
    permissions:
      attestations: write
      contents: write
      id-token: write
